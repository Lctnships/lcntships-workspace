sonar.projectKey=lcntships-workspace
sonar.projectName=lcntships Workspace
sonar.projectVersion=0.1.0

# Source
sonar.sources=src
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/__tests__/**,**/node_modules/**,**/.next/**,**/coverage/**

# Language
sonar.javascript.lcov.reportPaths=coverage/lcov.info

